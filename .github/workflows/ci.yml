name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies + pytest
        # requirements.txt is the single source of truth; macOS-only desktop
        # deps (rumps, pywebview) are excluded on Linux via platform markers.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          USE_LOCAL_VOICE: "false"
          TWILIO_AUTH_TOKEN: "faketwiliotoken"
          VALIDATE_TWILIO_SIGNATURE: "true"
          DEEPGRAM_API_KEY: ""
        run: pytest -q
