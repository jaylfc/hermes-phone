name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install server deps + pytest
        # Install only what server.py needs — do NOT use requirements.txt because
        # it includes `rumps` which is macOS-only and will fail on ubuntu-latest.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "flask>=3.0,<4" \
            "flask-sock>=0.7" \
            "twilio>=9.0,<10" \
            "openai>=1.50,<3" \
            "requests>=2.31" \
            "deepgram-sdk>=7,<8" \
            "pytest>=8.3,<10"

      - name: Run tests
        env:
          USE_LOCAL_VOICE: "false"
          HERMES_API_TOKEN: "secrettoken"
          TWILIO_AUTH_TOKEN: "faketwiliotoken"
          VALIDATE_TWILIO_SIGNATURE: "true"
          DEEPGRAM_API_KEY: ""
        run: pytest -q
