name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install server deps + pytest
        # Only the deps server.py needs. rumps + pywebview are macOS/desktop-only
        # (used by menubar.py / native_settings.py), not by the server tests, and
        # rumps fails to install on Linux.
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask flask-sock twilio "deepgram-sdk>=7,<8" requests openai pydub pytest

      - name: Run tests
        env:
          USE_LOCAL_VOICE: "false"
          TWILIO_AUTH_TOKEN: "faketwiliotoken"
          VALIDATE_TWILIO_SIGNATURE: "true"
          DEEPGRAM_API_KEY: ""
        run: pytest -q
